<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento</title>
    <link rel="stylesheet" href="assets/estilo.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="card">
            <h3>Condições de pagamento</h3>
            <input type="number" step="0.01" id="preco" placeholder="Preço da Etiqueta (R$)">
            <select id="condicao">
                <option value="1">1 - À vista (Dinheiro/PIX) - 10% desc.</option>
                <option value="2">2 - À vista (Cartão) - 5% desc.</option>
                <option value="3">3 - Em 2x - Preço normal</option>
                <option value="4">4 - Em 3x - Juros de 6%</option>
            </select>
            <button onclick="calcularPagamento()">Calcular Total</button>
            <div id="res7" class="result"></div>
        </div>
    </main>

    <script src="assets/funcionalidade.js"></script>
</body>
</html>
